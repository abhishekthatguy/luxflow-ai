name: E2E Nightly

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

jobs:
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Start stack
        run: |
          cp .env.example .env
          docker compose up -d --build
          docker compose exec -T api alembic -c alembic.ini upgrade head
          docker compose exec -T api python scripts/seed_dev.py
          docker compose exec -T api python scripts/seed_sprint4.py
          docker compose exec -T api python scripts/seed_sprint5.py
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Playwright E2E
        run: |
          npm install
          npx playwright install chromium --with-deps
          E2E_SKIP_WEB_SERVER=1 npm run test:e2e
      - name: Teardown
        if: always()
        run: docker compose down -v
