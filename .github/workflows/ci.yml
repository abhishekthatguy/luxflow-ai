name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Lint and unit test API
        run: |
          cd apps/api
          pip install -e ".[dev]"
          ruff check src tests
          mypy src
          pytest -q tests/

  lint-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Lint and test web
        run: |
          npm install
          cd apps/web && npm run lint && npm test

  platform-smoke:
    runs-on: ubuntu-latest
    needs: [lint-api, lint-web]
    steps:
      - uses: actions/checkout@v4
      - name: Start full stack
        run: |
          cp .env.example .env
          docker compose up -d --build
      - name: Run migrations
        run: docker compose exec -T api alembic -c alembic.ini upgrade head
      - name: Verify platform readiness (local)
        run: |
          chmod +x scripts/verify/*.sh
          ./scripts/verify/quickstart.sh
          ./scripts/verify/health.sh
          ./scripts/verify/logging.sh
          ./scripts/verify/traces.sh
          ./scripts/verify/integration.sh
          ./scripts/verify/n8n-callback.sh
      - name: Trivy scan API image
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: lexflow-ai-api
          severity: CRITICAL
          exit-code: 1
      - name: Teardown
        if: always()
        run: docker compose down -v
