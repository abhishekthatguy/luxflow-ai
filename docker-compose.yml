services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: lexflow
      POSTGRES_PASSWORD: lexflow
      POSTGRES_DB: lexflow
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lexflow -d lexflow"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  rabbitmq:
    image: rabbitmq:3-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: lexflow
      MINIO_ROOT_PASSWORD: lexflowsecret
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 10

  tempo:
    image: grafana/tempo:2.3.1
    command: ["-config.file=/etc/tempo.yaml"]
    volumes:
      - ./infra/observability/tempo.yaml:/etc/tempo.yaml:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3200/ready"]
      interval: 10s
      timeout: 5s
      retries: 10

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.96.0
    command: ["--config=/etc/otelcol-contrib/config.yaml"]
    volumes:
      - ./infra/observability/otel-collector.yaml:/etc/otelcol-contrib/config.yaml:ro
    ports:
      - "4317:4317"
      - "13133:13133"
    depends_on:
      tempo:
        condition: service_healthy
    # Distroless image — no shell/wget; readiness via extension on :13133 (verified by verify-traces)

  grafana:
    image: grafana/grafana:10.4.2
    ports:
      - "3001:3000"
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
    volumes:
      - ./infra/observability/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      tempo:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 10

  n8n:
    image: n8nio/n8n:1.76.1
    ports:
      - "5679:5678"
    environment:
      N8N_HOST: localhost
      N8N_PORT: 5678
      N8N_PROTOCOL: http
      N8N_EDITOR_BASE_URL: http://localhost:5679
      N8N_SECURE_COOKIE: "false"
      N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS: "false"
      N8N_DIAGNOSTICS_ENABLED: "false"
      N8N_PERSONALIZATION_ENABLED: "false"
      WEBHOOK_URL: http://n8n:5678/
      GENERIC_TIMEZONE: UTC
    volumes:
      - n8n_data:/home/node/.n8n
      - ./n8n/workflows:/workflows:ro
      - ./n8n/docker-entrypoint.sh:/docker-entrypoint.sh:ro
      - ./n8n/purge-managed-workflows.js:/purge-managed-workflows.js:ro
    entrypoint: ["/bin/sh", "/docker-entrypoint.sh"]
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:5678/healthz"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  api:
    build:
      context: ./apps/api
      target: dev
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://lexflow:lexflow@postgres:5432/lexflow
      REDIS_URL: redis://redis:6379/0
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      CELERY_BROKER_URL: amqp://guest:guest@rabbitmq:5672/
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: lexflow
      S3_SECRET_KEY: lexflowsecret
      S3_BUCKET: lexflow-local-documents
      S3_PRESIGN_ENDPOINT: http://localhost:9000
      N8N_INTERNAL_URL: http://n8n:5678
      N8N_WEBHOOK_SECRET: dev-n8n-webhook-secret
      OTEL_SERVICE_NAME: lexflow-api
      CORS_ORIGINS: http://localhost:3000
      ENVIRONMENT: local
      JWT_SECRET: ${JWT_SECRET:-dev-jwt-secret-change-in-production}
      JWT_ACCESS_TTL_MINUTES: ${JWT_ACCESS_TTL_MINUTES:-60}
      OLLAMA_BASE_URL: http://ollama:11434
      LLM_PROVIDER: ${LLM_PROVIDER:-ollama}
      LLM_ALLOW_STUB: ${LLM_ALLOW_STUB:-true}
      OLLAMA_CHAT_MODEL: ${OLLAMA_CHAT_MODEL:-qwen2.5:latest}
      ADMIN_NOTIFICATION_EMAILS: ${ADMIN_NOTIFICATION_EMAILS:-}
      MAIL_FROM_NAME: ${MAIL_FROM_NAME:-LexFlow AI Workflow Engine}
      MAIL_FROM_ADDRESS: ${MAIL_FROM_ADDRESS:-}
      MANAGING_PARTNER_EMAIL: ${MANAGING_PARTNER_EMAIL:-}
      ATTORNEY_EMAIL: ${ATTORNEY_EMAIL:-}
      ASSOCIATE_EMAIL: ${ASSOCIATE_EMAIL:-}
      PARALEGAL_EMAIL: ${PARALEGAL_EMAIL:-}
      SYSTEM_ADMINISTRATOR_EMAIL: ${SYSTEM_ADMINISTRATOR_EMAIL:-}
      TEAMS_WEBHOOK_URL: ${TEAMS_WEBHOOK_URL:-}
      NOTIFICATION_WEB_BASE_URL: ${NOTIFICATION_WEB_BASE_URL:-http://localhost:3000}
      GMAIL_USER: ${GMAIL_USER:-}
      GMAIL_APP_PASSWORD: ${GMAIL_APP_PASSWORD:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      minio:
        condition: service_healthy
      ollama:
        condition: service_started
      otel-collector:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')\""]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    volumes:
      - ./tests:/tests:ro
      - ./apps/api/scripts:/app/scripts
      - ./apps/api/src:/app/src
      - ./apps/api/templates:/app/templates
      - ./config:/config:ro

  worker:
    build:
      context: .
      dockerfile: workers/Dockerfile
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://lexflow:lexflow@postgres:5432/lexflow
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: amqp://guest:guest@rabbitmq:5672/
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: lexflow
      S3_SECRET_KEY: lexflowsecret
      S3_BUCKET: lexflow-local-documents
      S3_PRESIGN_ENDPOINT: http://localhost:9000
      N8N_INTERNAL_URL: http://n8n:5678
      N8N_WEBHOOK_SECRET: dev-n8n-webhook-secret
      OLLAMA_BASE_URL: http://ollama:11434
      LLM_PROVIDER: ${LLM_PROVIDER:-ollama}
      LLM_ALLOW_STUB: ${LLM_ALLOW_STUB:-true}
      OLLAMA_CHAT_MODEL: ${OLLAMA_CHAT_MODEL:-qwen2.5:latest}
      OCR_PROVIDER: local
      OCR_ENABLE_PADDLE: "true"
      EMBEDDING_ENABLED: "true"
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      OTEL_SERVICE_NAME: lexflow-worker
      ENVIRONMENT: local
      MAIL_FROM_NAME: ${MAIL_FROM_NAME:-LexFlow AI Workflow Engine}
      MAIL_FROM_ADDRESS: ${MAIL_FROM_ADDRESS:-}
      MANAGING_PARTNER_EMAIL: ${MANAGING_PARTNER_EMAIL:-}
      ATTORNEY_EMAIL: ${ATTORNEY_EMAIL:-}
      ASSOCIATE_EMAIL: ${ASSOCIATE_EMAIL:-}
      TEAMS_WEBHOOK_URL: ${TEAMS_WEBHOOK_URL:-}
      NOTIFICATION_WEB_BASE_URL: ${NOTIFICATION_WEB_BASE_URL:-http://localhost:3000}
      GMAIL_USER: ${GMAIL_USER:-}
      GMAIL_APP_PASSWORD: ${GMAIL_APP_PASSWORD:-}
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
      ollama:
        condition: service_started
      api:
        condition: service_healthy
    volumes:
      - ./apps/api/src:/app/apps/api/src
      - ./apps/api/templates:/app/templates
      - ./apps/api/scripts:/app/scripts
    healthcheck:
      test: ["CMD-SHELL", "celery -A lexflow_api.celery_app:celery_app inspect ping -t 5 | grep -q OK"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 45s

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      target: dev
    ports:
      - "3000:3000"
    volumes:
      - ./apps/web/src:/app/apps/web/src
      - ./apps/web/public:/app/apps/web/public
      - ./packages/shared/src:/app/packages/shared/src
      - ./packages/ui/src:/app/packages/ui/src
    env_file:
      - .env
    environment:
      API_INTERNAL_URL: http://api:8000
      NEXT_PUBLIC_API_URL: http://localhost:8000
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/ >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 lexflow lexflowsecret &&
      mc mb --ignore-existing local/lexflow-local-documents &&
      exit 0
      "

volumes:
  postgres_data:
  minio_data:
  n8n_data:
  ollama_data:
